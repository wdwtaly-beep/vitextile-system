version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vitextile_postgres
    environment:
      POSTGRES_DB: vitextile_erp
      POSTGRES_USER: vitextile_user
      POSTGRES_PASSWORD: vitextile_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vitextile_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: vitextile_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@vitextile.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - vitextile_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vitextile_backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://vitextile_user:vitextile_password@postgres:5432/vitextile_erp
      - JWT_SECRET=your_jwt_secret_key_here
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - vitextile_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vitextile_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - vitextile_network

volumes:
  postgres_data:

networks:
  vitextile_network:
    driver: bridge
